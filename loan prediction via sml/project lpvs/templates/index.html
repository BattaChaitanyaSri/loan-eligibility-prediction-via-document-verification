<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Loan Eligibility & Verification</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
        }

        .hero {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 50px 20px;
            text-align: center;
        }

        .hero h1 {
            font-weight: 700;
        }

        .card {
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .step-title {
            font-weight: 600;
            color: #1e3c72;
        }

        .form-control, .form-select {
            border-radius: 10px;
        }

        .btn-primary, .btn-success, .btn-secondary {
            border-radius: 10px;
            padding: 10px 20px;
        }

        #step2 {
            display: none;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            background: #212529;
            color: white;
            text-align: center;
        }
    </style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <h1>AI Loan Prediction System</h1>
    <p class="lead mt-2">
        Small Language Model–based Loan Eligibility & LlamaIndex Document Verification
    </p>
</section>

<!-- MAIN -->
<div class="container my-5">
    <div class="card p-4">

        <!-- STEP 1 FORM -->
        <div id="step1">
            <h4 class="step-title mb-4">Step 1: Applicant Details</h4>

            <form id="step1Form">

                <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">User Name</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Gender</label>
                    <select name="gender" class="form-select" required>
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Income per Month (₹)</label>
                    <input type="number" name="income" class="form-control" required>
                </div>

                <!-- ✅ NEW FIELD: CIBIL SCORE -->
                <div class="col-md-6">
                    <label class="form-label">CIBIL Score</label>
                    <input
                        type="number"
                        name="cibil_score"
                        class="form-control"
                        min="300"
                        max="900"
                        placeholder="300 - 900"
                        required
                    >
                </div>

                <div class="col-md-6">
                    <label class="form-label">Marital Status</label>
                    <select name="marital_status" class="form-select" required>
                        <option value="">Select</option>
                        <option>Married</option>
                        <option>Unmarried</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Dependents</label>
                    <input type="number" name="dependents" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Loan Amount (₹)</label>
                    <input type="number" name="loan_amount" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Loan Period (Months)</label>
                    <input type="number" name="loan_period" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Co-Applicant Income (₹)</label>
                    <input type="number" name="coapplicant_income" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Employment Status</label>
                    <select name="employment_status" class="form-select" required>
                        <option value="">Select</option>
                        <option>Salaried</option>
                        <option>Self-Employed</option>
                        <option>Unemployed</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Property Location</label>
                    <select name="property_location" class="form-select" required>
                        <option value="">Select</option>
                        <option>Urban</option>
                        <option>Semi-Urban</option>
                        <option>Rural</option>
                    </select>
                </div>

            </div>
            <div class="text-end mt-4">
            <button
                type="button"
                class="btn btn-primary"
                onclick="submitStep1()">
                Continue to Document Upload →
            </button>
        </div>
         </form>
        </div>

        <!-- STEP 2 FORM -->
        <div id="step2">
            <h4 class="step-title mb-4">Step 2: Document Verification</h4>

            <form action="/submit-step2" method="POST" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">Government ID Proof</label>
                    <input type="file" name="gov_id" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Salary Slip</label>
                    <input type="file" name="salary_slip" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">CIBIL Statement</label>
                    <input type="file" name="cibil" class="form-control" required>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <button type="button" class="btn btn-secondary" onclick="goBack()">← Back</button>
                    <button type="submit" class="btn btn-success">Submit for AI Verification</button>
                </div>

            </form>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer>
    © 2026 AI Loan Prediction System | Powered by Small Language Models & LlamaIndex
</footer>

<!-- JS -->
<script>
    function goToStep2() {
        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
    }

    function goBack() {
        document.getElementById("step2").style.display = "none";
        document.getElementById("step1").style.display = "block";
    }

    function submitStep1() {
        const form = document.getElementById("step1Form");
        const formData = new FormData(form);

        fetch("/submit-step1", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                goToStep2();
            } else {
                alert("Failed to save data");
            }
        })
        .catch(() => alert("Server error"));
    }
</script>

</body>
</html>
